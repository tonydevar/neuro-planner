version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Point Vite's dev proxy at the backend Docker service, not localhost
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
